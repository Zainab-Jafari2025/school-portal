<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Contact</title>
</head>

<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">🏫 Bright Future School</a>

      <button class="menu-btn" id="menu-btn">☰</button>

  <!-- Contact Section -->
  <section class="contact-section">

    <h2>📩 Contact School</h2>

    <div class="contact-form">

      <input type="text" id="contact-name" placeholder="Your Name" />
      <input type="email" id="contact-email" placeholder="Your Email" />
      <textarea id="contact-message" placeholder="Your Message"></textarea>

      <button id="send-btn">Send Message</button>

      <p id="contact-status"></p>

    </div>

  </section>

  <script src="contact.js"></script>
</body>
