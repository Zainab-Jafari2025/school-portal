<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Student Profile</title>
  </head>

  <body>

    <!-- Navbar -->
    <header>
      <nav class="navbar">
        <a href="index.html" class="logo">🏫 Bright Future School</a>

        <button class="menu-btn" id="menu-btn">☰</button>

        <ul class="nav-links" id="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="courses.html">Courses</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- Profile Section -->
    <section class="profile-section">

      <h2>👤 Student Profile</h2>

      <!-- Student Info Card -->
      <div class="student-card" id="profile-card">
        <h3 id="profile-name">Name: ---</h3>
        <p id="profile-age">Age: ---</p>
        <p id="profile-grade">Grade: ---</p>
        <p id="profile-score">Score: ---</p>
        <p id="profile-rank">Rank: ---</p>
        <p id="profile-status">Status: Active</p>
      </div>

      <!-- Actions -->
      <div class="profile-actions">

        <button id="toggle-info">Hide Info</button>

        <button id="toggle-status">Toggle Status</button>

      </div>

    </section>

    <script src="profile.js"></script>
  </body>
</html>
